<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wampland Dashboard</title>
    <style>
      @font-face {
        font-family: "Early Gameboy";
        src: url("/assets/fonts/early-gameboy.ttf") format("truetype");
        font-display: swap;
      }

      :root {
        --sky-top: #78a8ff;
        --sky-bottom: #5c94fc;
        --cloud: #f8f8f8;
        --ground: #c86b1d;
        --ground-dark: #8d3b0f;
        --ground-deep: #51210a;
        --brick: #b55a1c;
        --brick-dark: #7a3110;
        --question: #d79b21;
        --question-light: #f7c960;
        --pipe: #21a521;
        --pipe-light: #56d156;
        --hill: #2fad2f;
        --hill-shadow: #1b7d1b;
        --text: #ffffff;
        --shadow: rgba(0, 0, 0, 0.28);
        --black: #000000;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        font-family: "Early Gameboy", monospace;
        color: var(--text);
        background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 72%, #6f9bff 100%);
      }

      .scene {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .cloud,
      .hill,
      .pipe,
      .brick-strip,
      .ground {
        position: absolute;
      }

      .cloud {
        width: 132px;
        height: 40px;
        background: var(--cloud);
        border: 4px solid var(--black);
        box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.14);
      }

      .cloud::before,
      .cloud::after {
        content: "";
        position: absolute;
        background: var(--cloud);
        border: 4px solid var(--black);
      }

      .cloud::before {
        width: 40px;
        height: 40px;
        left: 16px;
        top: -20px;
      }

      .cloud::after {
        width: 52px;
        height: 52px;
        right: 18px;
        top: -28px;
      }

      .cloud-1 { top: 8vh; left: 6vw; }
      .cloud-2 { top: 14vh; right: 12vw; transform: scale(0.88); }
      .cloud-3 { top: 24vh; left: 50%; transform: translateX(-50%) scale(0.72); }

      .hill {
        bottom: 136px;
        width: 180px;
        height: 112px;
        background: var(--hill);
        border: 4px solid var(--black);
        border-bottom: none;
        border-radius: 90px 90px 0 0;
        box-shadow: inset -16px 0 0 var(--hill-shadow);
      }

      .hill-1 { left: -24px; transform: scale(0.88); }
      .hill-2 { right: 8vw; width: 150px; height: 94px; }

      .pipe {
        bottom: 116px;
        width: 96px;
        height: 148px;
        background: linear-gradient(90deg, var(--pipe-light) 0 24%, var(--pipe) 24% 76%, #157915 76% 100%);
        border: 4px solid var(--black);
        box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.14);
      }

      .pipe::before {
        content: "";
        position: absolute;
        left: -10px;
        right: -10px;
        top: -22px;
        height: 28px;
        background: linear-gradient(90deg, #75e675 0 22%, var(--pipe) 22% 74%, #157915 74% 100%);
        border: 4px solid var(--black);
      }

      .pipe-1 { left: 16vw; height: 124px; }
      .pipe-2 { right: 26vw; width: 74px; height: 98px; }

      .brick-strip {
        height: 28px;
        border: 4px solid var(--black);
        background:
          repeating-linear-gradient(90deg, transparent 0 26px, rgba(0, 0, 0, 0.35) 26px 30px),
          linear-gradient(180deg, #d98a3b 0%, var(--brick) 44%, var(--brick-dark) 100%);
      }

      .brick-strip-1 { top: 18vh; left: 18vw; width: 180px; }
      .brick-strip-2 { top: 12vh; right: 18vw; width: 132px; }

      .ground {
        left: 0;
        right: 0;
        bottom: 0;
        height: 124px;
        background:
          linear-gradient(180deg, var(--ground) 0 24%, var(--ground-dark) 24% 66%, var(--ground-deep) 66% 100%);
        border-top: 4px solid var(--black);
      }

      .app {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 18px 148px;
      }

      .panel {
        width: min(1120px, 100%);
        padding: 22px;
        border: 4px solid var(--black);
        background: rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(3px);
        box-shadow: 0 20px 0 rgba(0, 0, 0, 0.18);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      .title {
        font-size: clamp(18px, 3vw, 28px);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.36);
      }

      .refresh {
        padding: 10px 14px;
        border: 4px solid var(--black);
        color: var(--black);
        background: linear-gradient(180deg, var(--question-light), var(--question));
        cursor: pointer;
      }

      .refresh:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-bottom: 18px;
        font-size: 11px;
        text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.32);
      }

      .stats-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: flex-start;
      }

      .stat-card {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-width: 132px;
        min-height: 98px;
        padding: 12px 16px;
        border: 4px solid var(--black);
        box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.16);
      }

      .stat-card[data-tone="question"] {
        color: var(--black);
        background: linear-gradient(180deg, var(--question-light), var(--question));
      }

      .stat-card[data-tone="brick"] {
        background: linear-gradient(180deg, #d98a3b 0%, var(--brick) 44%, var(--brick-dark) 100%);
      }

      .stat-card[data-tone="pipe"] {
        background: linear-gradient(180deg, #75e675 0 18%, var(--pipe) 18% 76%, #157915 76% 100%);
      }

      .stat-label {
        margin-bottom: 10px;
        font-size: 11px;
        text-align: center;
        line-height: 1.35;
      }

      .stat-value {
        white-space: nowrap;
        font-size: clamp(22px, 4vw, 36px);
        line-height: 1;
        text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.28);
      }

      @media (max-width: 720px) {
        .panel { padding: 16px; }
        .topbar { align-items: stretch; flex-direction: column; }
        .refresh { width: 100%; }
        .stat-card { min-width: 112px; min-height: 88px; }
      }
    </style>
  </head>
  <body>
    <div class="scene" aria-hidden="true">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
      <div class="brick-strip brick-strip-1"></div>
      <div class="brick-strip brick-strip-2"></div>
      <div class="pipe pipe-1"></div>
      <div class="pipe pipe-2"></div>
      <div class="hill hill-1"></div>
      <div class="hill hill-2"></div>
      <div class="ground"></div>
    </div>
    <main class="app">
      <section class="panel">
        <div class="topbar">
          <div class="title">Wampland Dashboard</div>
          <button id="refresh-button" class="refresh" type="button">Refresh</button>
        </div>
        <div class="meta">
          <div id="last-updated">No snapshot yet</div>
          <div id="status">Waiting</div>
        </div>
        <div id="stats-grid" class="stats-grid" aria-live="polite"></div>
      </section>
    </main>
    <script type="module" src="/src/dashboard.ts"></script>
  </body>
</html>
